<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TURING MACHINE PLAYGROUND</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="components-pane draggable">
            <div class="state-button button" mode="state">state</div>
            <div class="arrow-button button" mode="arrow">arrow</div>
            <div class="initial-state-button button" mode="initial-state">
                initialstate
            </div>
            <div class="accept-state-button button" mode="accept-state">
                accept
            </div>
            <div class="reject-state-button button" mode="reject-state">
                reject
            </div>
            <div class="hand-button button active-button" mode="grab">grab</div>
        </div>

        <div class="canvas">
            this is the canvas hereeeeeeeeeeeeeeeeeeeeeeeeeee
        </div>

        <div id="transitionModal" class="modal hidden">
            <div class="modal-box">
                <h2 display="inline">TRANSITION: </h2> <input id="read-input" class="input-transition read" placeholder="[read]"/> / <input id="write-input" class="write input-transition" placeholder="[write]" />, <input id="move-input" class="move input-transition" placeholder="[move]" />
                <div class="modal-actions">
                    <button onclick="submitTransition()" class="ok-btn">
                        OK
                    </button>
                    <button onclick="closeModal()" class="cancel-btn">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
